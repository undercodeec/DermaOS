name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: integration_secret
          POSTGRES_DB: derma_os_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d derma_os_integration"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:integration_secret@127.0.0.1:5432/derma_os_integration?schema=public
      DIRECT_URL: postgresql://postgres:integration_secret@127.0.0.1:5432/derma_os_integration?schema=public
      INTEGRATION_DATABASE_URL: postgresql://postgres:integration_secret@127.0.0.1:5432/derma_os_integration?schema=public
      JWT_SECRET: ci-jwt-secret-at-least-32-characters
      PLATFORM_REGISTER_KEY: ci-platform-register-key-at-least-32-characters
      PLATFORM_ADMIN_PASSWORD: integration-platform-password
      PLATFORM_JWT_SECRET: ci-platform-jwt-secret-at-least-32-characters
      PAYPHONE_CREDENTIAL_KEY: ci-payphone-key-at-least-32-characters
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @derma-os/api db:generate

      - name: Apply migrations to ephemeral PostgreSQL
        run: pnpm --filter @derma-os/api exec prisma migrate deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint dashboard
        run: pnpm lint

      - name: Unit tests
        run: pnpm --filter @derma-os/api test

      - name: HTTP and database integration tests
        run: pnpm test:integration

      - name: Production build
        run: pnpm build
